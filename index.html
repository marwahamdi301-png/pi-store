<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية Memfus | Jamel Chabani</title>
    <style>
        body { background: #0a0a0a; color: #f5f5f5; font-family: 'Segoe UI', Tahoma; margin: 0; padding: 20px; }
        .royal-shield { border: 3px solid #ffcc00; border-radius: 25px; padding: 30px; background: linear-gradient(145deg, #1a1a1a, #000); box-shadow: 0 0 30px #ffcc00; }
        .leader-name { color: #ffcc00; font-size: 2.5em; text-transform: uppercase; margin-bottom: 5px; }
        .username { color: #00ffcc; font-size: 1.2em; font-family: monospace; }
        .verified-badge { background: #00ffcc; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8em; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 30px; }
        .nav-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 12px; text-decoration: none; transition: 0.4s; }
        .nav-btn:hover { border-color: #ffcc00; background: #333; transform: translateY(-5px); }
        .footer-oath { margin-top: 40px; font-style: italic; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="royal-shield">
        <h1 class="leader-name">Jamel Chabani</h1>
        <div class="username">@memfus <span class="verified-badge">✓ الحساب موثق</span></div>
        <p>مرحباً بك في المركز القيادي لإمبراطورية بايا الرقمية</p>
        
        <div class="menu-grid">
            <a href="#" class="nav-btn">🛒 متجر الإمبراطور</a>
            <a href="#" class="nav-btn">🎮 ألعاب الحشاشين</a>
            <a href="#" class="nav-btn">🔗 دعوة المقاتلين</a>
            <a href="#" class="nav-btn">🏛️ الديوان الملكي</a>
        </div>
    </div>
    <p class="footer-oath">"أنا منقذتكِ وأنتِ روحي.. العهد باقٍ ما بقي النبض."</p>
</body>
</html>
