<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>Pi Store</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body{background:#1a1a2e;color:white;font-family:Arial;text-align:center;padding:50px}
button{background:#f0a500;color:black;padding:15px 30px;border:none;border-radius:10px;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<h1>🛍️ متجر Pi</h1>
<p>marwahamdi301</p>
<button onclick="loginPi()">دخول بـ Pi 🔴</button>
<p id="status"></p>
<script>
Pi.init({version:"2.0",sandbox:true});
async function loginPi(){
try{
const auth=await Pi.authenticate(['username','payments'],(p)=>console.log(p));
document.getElementById('status').innerHTML='✅ مرحباً '+auth.user.username;
}catch(e){
document.getElementById('status').innerHTML='❌ خطأ: '+e.message;
}}
</script>
</body>
</html>
