<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baya PiMarket - Secure</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #050510; color: #e0e0e0; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111125; border: 2px solid #2a2a4a; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        button { background: #f0a500; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <h1>🛍️ Baya PiMarket</h1>
    <div class="card">
        <p id="user-info">🔒 يرجى تسجيل الدخول</p>
        <button onclick="login()">دخول آمن بـ Pi 🔴</button>
    </div>
    <div class="card">
        <h3>🤖 بوت مراقبة الحيتان (VIP)</h3>
        <p>السعر: 10 π</p>
        <button id="buy-btn" onclick="transferPi('Whale Bot', 10)" disabled style="opacity:0.5;">شراء الآن</button>
    </div>
    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function login() {
            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('user-info').innerText = "✅ مرحباً: " + auth.user.username;
                document.getElementById('buy-btn').disabled = false;
                document.getElementById('buy-btn').style.opacity = "1";
            } catch (err) { alert("افتح الموقع من Pi Browser فقط"); }
        }

        function onIncompletePaymentFound(payment) { console.log("Payment incomplete"); }

        async function transferPi(name, amount) {
            try {
                await Pi.createPayment({
                    amount: amount,
                    memo: "شراء " + name,
                    metadata: { productName: name }
                }, {
                    onReadyForServerApproval: (id) => { console.log("Approval pending: ", id); },
                    onReadyForServerCompletion: (id, txid) => { alert("🎉 تمت العملية بنجاح!"); },
                    onCancel: () => alert("تم الإلغاء"),
                    onError: (e) => alert("خطأ في العملية")
                });
            } catch (e) { alert("سجل دخولك أولاً"); }
        }
    </script>
</body>
</html>
