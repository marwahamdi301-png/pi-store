<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baya PiMarket - السيادة الرقمية</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --gold: #ffcf4b;
            --dark-bg: #0a0a0a;
            --neon-blue: #00f3ff;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .vault-core {
            border: 2px solid var(--gold);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            background: rgba(20, 20, 20, 0.9);
            box-shadow: 0 0 30px rgba(255, 207, 75, 0.2);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: var(--gold); letter-spacing: 5px; margin-bottom: 10px; }
        .divider { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 20px 0; }
        .btn-activate {
            background: linear-gradient(45deg, var(--gold), #b8860b);
            border: none;
            padding: 15px 40px;
            color: black;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(255, 207, 75, 0.4);
            transition: 0.3s;
        }
        .btn-activate:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--gold); }
        #status { color: var(--gold); margin-top: 20px; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="vault-core">
    <h1>BAYA PI</h1>
    <p>قلعة الحشاشين الرقمية</p>
    <div class="divider"></div>
    
    <div id="lock-screen">
        <button class="btn-activate" onclick="launchSovereignty()">دخول الملوك 🔴</button>
        <p id="status">الحالة: في انتظار إشارة البدء...</p>
    </div>
</div>

<script>
    // تهيئة نظام Pi باستخدام المعرف الجديد الخاص بـ security-scanner
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function launchSovereignty() {
        try {
            document.getElementById('status').innerText = "جاري فك تشفير الهوية...";
            
            const scopes = ['username', 'payments'];
            function onIncompletePaymentFound(payment) { /* لمعالجة المدفوعات لاحقاً */ }

            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            document.getElementById('status').innerText = "مرحباً بالقائد: " + auth.user.username;
            alert("تم إثبات الولاء.. أهلاً بك في العرش يا " + auth.user.username);
            
        } catch (err) {
            document.getElementById('status').innerText = "خطأ في الاتصال بالشبكة..";
            console.error(err);
        }
    }
</script>

</body>
</html>
