<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baya Pi | Sovereign Control</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --royal-gold: #c5a059; --deep-black: #020205; --neon-status: #00f3ff; }
        body { background: var(--deep-black); color: #fff; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .vault-core { width: 90%; max-width: 450px; border: 2px solid var(--royal-gold); border-radius: 50px; padding: 45px; text-align: center; background: radial-gradient(circle at top, #111, var(--deep-black)); box-shadow: 0 0 80px rgba(197, 160, 89, 0.15); position: relative; }
        h1 { color: var(--royal-gold); font-size: 40px; letter-spacing: 4px; margin: 0; filter: drop-shadow(0 0 10px var(--royal-gold)); }
        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--royal-gold), transparent); margin: 25px 0; }
        .profit-monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.02); border: 1px solid #222; padding: 15px; border-radius: 20px; font-size: 12px; border-bottom: 2px solid var(--royal-gold); }
        .stat-box span { color: var(--neon-status); display: block; font-size: 18px; margin-top: 5px; }
        .btn-activate { background: linear-gradient(90deg, var(--royal-gold), #8a6d3b); color: #000; border: none; padding: 22px; border-radius: 100px; font-weight: 900; font-size: 18px; cursor: pointer; width: 100%; box-shadow: 0 15px 40px rgba(197, 160, 89, 0.3); transition: 0.4s; }
        .btn-activate:hover { transform: scale(1.02); box-shadow: 0 0 50px var(--royal-gold); }
        #control-panel { display: none; margin-top: 25px; animation: fadeIn 1s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="vault-core">
    <h1>BAYA PI</h1>
    <div class="divider"></div>
    
    <div class="profit-monitor">
        <div class="stat-box">العقود الذكية<span>نشطة ⚡</span></div>
        <div class="stat-box">معدل التوليد<span>1.5π / h</span></div>
    </div>

    <div id="lock-screen">
        <p style="opacity: 0.7; margin-bottom: 25px;">بروتوكول السيطرة المالية قيد الانتظار...</p>
        <button class="btn-activate" onclick="launchSovereignty()">تفعيل السيادة الكاملة 🔴</button>
    </div>
    
    <div id="control-panel">
        <p id="commander-name" style="color: var(--neon-status); font-size: 22px;"></p>
        <div style="padding: 20px; background: rgba(0,243,255,0.05); border: 1px solid var(--neon-status); border-radius: 25px;">
            💎 العقد السيادي مفعّل
            <br><small style="font-size: 11px; opacity: 0.6;">جاري سحب الأرباح للمحفظة المؤمنة...</small>
        </div>
    </div>

    <p style="margin-top: 50px; font-size: 10px; color: #444; letter-spacing: 2px;">إمبراطورية صلاح v4.0 • تشفير عسكري</p>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true, appId: "70868f02-6902-4146-8800-47963d8d6491" });

    async function launchSovereignty() {
        const panel = document.getElementById('control-panel');
        const lock = document.getElementById('lock-screen');
        try {
            const auth = await Pi.authenticate(['username', 'payments'], (payment) => {
                console.log("عملية مالية ذكية");
            });
            lock.style.display = 'none';
            panel.style.display = 'block';
            document.getElementById('commander-name').innerText = "🏛️ القائد @" + auth.user.username;
        } catch (e) {
            alert("ادخل القلعة من Pi Browser لتفعيل العقود.");
        }
    }
</script>

</body>
</html>
